<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- Enhanced mobile viewport settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- iOS-specific meta tags for PWA-like experience -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Analytics Product" />
    
    <!-- Android/Chrome mobile app configuration -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#6b7280" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- Disable auto-detection of phone numbers (prevents unwanted links) -->
    <meta name="format-detection" content="telephone=no" />
    
    <title>Analytics Product — See everything. Miss nothing.</title>

    <!-- @system: OG / social meta tags — static fallbacks for crawlers that don't run JS -->
    <!-- @custom: replace placeholder values below with your real product info             -->
    <meta name="description" content="See everything. Miss nothing. Privacy-first product analytics for SaaS founders." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Analytics Product — See everything. Miss nothing." />
    <meta property="og:description" content="Privacy-first product analytics for SaaS founders. Own your data." />
    <meta property="og:url" content="https://analytics-product-production.up.railway.app" />
    <meta property="og:image" content="https://analytics-product-production.up.railway.app/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Analytics Product — See everything. Miss nothing." />
    <meta name="twitter:description" content="Privacy-first product analytics for SaaS founders. Own your data." />
    <meta name="twitter:url" content="https://analytics-product-production.up.railway.app" />
    <meta name="twitter:image" content="https://analytics-product-production.up.railway.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
